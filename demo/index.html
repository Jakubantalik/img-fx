    <script>
      // Resolve theme synchronously, before React boots, by reading the
      // OS `prefers-color-scheme` preference and stamping `data-theme` on
      // <html>. Doing this here (and not in App.tsx's first effect) is
      // what keeps a light-mode visitor from seeing a single frame of
      // dark page chrome while React mounts. Wrapped in try/catch so a
      // very old browser without matchMedia silently falls back to dark
      // — same as the previous hardcoded default.
      (function () {
        try {
          var isLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          document.documentElement.setAttribute(
            'data-theme',
            isLight ? 'light' : 'dark'
          );
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
